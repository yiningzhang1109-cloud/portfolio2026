<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Yining Zhang — Portfolio</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300;1,400&family=Atkinson+Hyperlegible:wght@400;700&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
:root{--black:#080808;--fg:#e2dcd2;--fg2:#62605c}
html,body{width:100%;height:100%;overflow:hidden;background:var(--black);cursor:none}

.cursor{position:fixed;width:7px;height:7px;background:#fff;border-radius:50%;
  pointer-events:none;z-index:9999;transform:translate(-50%,-50%);
  mix-blend-mode:difference;transition:width .18s,height .18s}
.cursor.big{width:40px;height:40px}

/* NAV */
nav{position:fixed;top:0;left:0;right:0;z-index:200;
  display:flex;justify-content:space-between;align-items:flex-start;
  padding:1.8rem 2.5rem;pointer-events:none}
.nav-id{pointer-events:auto}
.nav-name{font-family:'Cormorant Garamond',serif;font-size:1.6rem;
  font-weight:300;font-style:italic;color:var(--fg);line-height:1.2}
.nav-sub{font-family:'Atkinson Hyperlegible',sans-serif;font-size:.68rem;
  font-weight:400;color:var(--fg2);line-height:1.7;max-width:420px;margin-top:.2rem}

/* THUMB NAV */
.thumb-nav{position:fixed;bottom:1.8rem;right:2rem;z-index:200;
  display:flex;flex-direction:column;gap:5px;align-items:flex-end}
.thumb-item{display:flex;align-items:center;gap:8px;cursor:pointer;
  opacity:.18;transition:opacity .3s}
.thumb-item.active{opacity:1}
.thumb-item:hover{opacity:.5}
.thumb-rect{width:30px;height:19px;overflow:hidden;background:#222;flex-shrink:0}
.thumb-rect img{width:100%;height:100%;object-fit:cover}
.thumb-label{font-family:'Atkinson Hyperlegible',sans-serif;font-size:.56rem;
  color:var(--fg2);letter-spacing:.1em;text-transform:uppercase;text-align:right}

/* DRUM */
.stage{position:fixed;inset:0;perspective:800px;
  perspective-origin:50% 50%;overflow:hidden}
.drum{position:absolute;width:100%;height:100%;
  transform-style:preserve-3d;transform:rotateZ(-6deg)}

.card{position:absolute;width:88vw;height:78vh;
  left:50%;top:50%;margin-left:-44vw;margin-top:-39vh;
  cursor:pointer;will-change:transform;overflow:hidden}
.card-img{position:absolute;inset:-10%;
  background-size:cover;background-position:center;
  will-change:transform}
.card-overlay{position:absolute;inset:0;
  background:linear-gradient(170deg,rgba(0,0,0,.05) 0%,rgba(0,0,0,.55) 100%)}
.card-arrow{position:absolute;top:50%;left:50%;
  transform:translate(-50%,-50%) scale(0);
  width:56px;height:56px;border-radius:50%;
  background:rgba(255,255,255,.1);border:1px solid rgba(255,255,255,.28);
  display:flex;align-items:center;justify-content:center;
  transition:transform .32s cubic-bezier(.34,1.56,.64,1);z-index:2;
  backdrop-filter:blur(6px)}
.card:hover .card-arrow{transform:translate(-50%,-50%) scale(1)}
.card-arrow svg{width:20px;height:20px;stroke:#fff;fill:none}

/* TITLE LAYER */
#titleLayer{position:fixed;inset:0;pointer-events:none;z-index:100;overflow:hidden}
.title-wrap{position:absolute;left:0;width:100%;
  display:flex;flex-direction:column;align-items:center;text-align:center;padding:0 4vw}
.t-cat{font-family:'Atkinson Hyperlegible',sans-serif;font-size:.66rem;
  color:rgba(255,255,255,.55);letter-spacing:.22em;text-transform:uppercase;
  margin-bottom:.5rem;display:block}
.t-name{font-family:'Cormorant Garamond',serif;
  font-size:clamp(5.5rem,13vw,12rem);
  font-weight:300;font-style:italic;color:#fff;
  line-height:.85;letter-spacing:-.02em;
  text-shadow:0 2px 60px rgba(0,0,0,.5)}
.t-arrow{margin-top:1.4rem;width:48px;height:48px;border-radius:50%;
  background:rgba(255,255,255,.12);border:1px solid rgba(255,255,255,.28);
  display:flex;align-items:center;justify-content:center;
  backdrop-filter:blur(6px);pointer-events:auto;cursor:pointer;
  transition:background .2s,transform .2s}
.t-arrow:hover{background:rgba(255,255,255,.22);transform:scale(1.1)}
.t-arrow svg{width:18px;height:18px;stroke:#fff;fill:none}
</style>
</head>
<body>

<div class="cursor" id="cursor"></div>

<nav>
  <div class="nav-id">
    <p class="nav-name">Yining Zhang</p>
    <p class="nav-sub">Aging HCI · AI Literacy · Experience Design · Storytelling · Gamification</p>
  </div>
</nav>

<div class="thumb-nav" id="thumbNav"></div>
<div class="stage"><div class="drum" id="drum"></div></div>
<div id="titleLayer"></div>

<script>
const PROJECTS = [
  {
    id:'about',
    title:'About',
    category:'About',
    img:'images/cover-about.jpg',
    page:'about.html'
  },
  {
    id:'your-tree',
    title:'"Your Tree"',
    category:'Data Physicalization',
    img:'images/cover-your-tree.jpg',
    page:'your-tree.html'
  },
  {
    id:'atlanta-heat',
    title:'Atlanta Heat',
    category:'Critical Data Visualization',
    img:'images/cover-atlanta-heat.png',
    page:'atlanta-heat.html'
  },
  {
    id:'clear-river',
    title:'Clear River',
    category:'Interactive Fiction · Folk Horror',
    img:'images/cover-clear-river.webp',
    page:'clear-river.html'
  },
  {
    id:'tokenverse',
    title:'TokenVerse',
    category:'AI Literacy · Educational RPG',
    img:'images/cover-tokenverse.png',
    page:'tokenverse.html'
  },
  {
    id:'postcard',
    title:'Global Identity Postcard',
    category:'Speculative Design · Trilogy I',
    img:'images/cover-postcard.jpg',
    page:'postcard.html'
  },
  {
    id:'thought-fortress',
    title:'Thought Fortress',
    category:'Interactive Narrative · Trilogy II',
    img:'images/cover-thought-fortress.png',
    page:'thought-fortress.html'
  },
  {
    id:'flesh-override',
    title:'Flesh Override',
    category:'Physical Computing · Trilogy III',
    img:'images/cover-flesh-override.jpg',
    page:'flesh-override.html'
  },
  {
    id:'subtitle-machine',
    title:'Subtitle Machine',
    category:'AI-Powered Workflow Tool',
    img:'images/cover-subtitle-machine.png',
    page:'subtitle-machine.html'
  },
  {
    id:'game-audio',
    title:'Game Audio Prompt Tool',
    category:'Claude Skill · AI-Assisted Composition',
    img:'images/cover-game-audio.png',
    page:'game-audio.html'
  },
];

let scrollPos    = 0;
let scrollTarget = 0;
let currentIdx   = 0;
let mouseX = window.innerWidth/2, mouseY = window.innerHeight/2;
let curX = mouseX, curY = mouseY;

const RADIUS  = 1600;
const ARC_DEG = 34;

const cardEls  = [];
const titleEls = [];

const drum       = document.getElementById('drum');
const titleLayer = document.getElementById('titleLayer');
const thumbNav   = document.getElementById('thumbNav');

PROJECTS.forEach((p,i) => {
  // Card
  const card = document.createElement('div');
  card.className = 'card';
  card.dataset.idx = i;
  card.innerHTML = `
    <div class="card-img" style="background-image:url('${p.img}')"></div>
    <div class="card-overlay"></div>
    <div class="card-arrow">
      <svg viewBox="0 0 24 24" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
        <path d="M5 12h14M12 5l7 7-7 7"/>
      </svg>
    </div>`;
  drum.appendChild(card);
  cardEls.push(card);

  // Title
  const tw = document.createElement('div');
  tw.className = 'title-wrap';
  tw.innerHTML = `
    <span class="t-cat">${p.category}</span>
    <h2 class="t-name">${p.title}</h2>
    <div class="t-arrow" data-idx="${i}">
      <svg viewBox="0 0 24 24" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
        <path d="M5 12h14M12 5l7 7-7 7"/>
      </svg>
    </div>`;
  titleLayer.appendChild(tw);
  titleEls.push(tw);

  tw.querySelector('.t-arrow').addEventListener('click', () => {
    if(Math.abs(scrollPos - i) < 0.4) window.location.href = p.page;
  });

  card.addEventListener('click', () => {
    if(Math.abs(scrollPos - i) < 0.4) window.location.href = p.page;
    else goTo(i);
  });

  // Thumb
  const th = document.createElement('div');
  th.className = 'thumb-item' + (i === 0 ? ' active' : '');
  th.innerHTML = `
    <span class="thumb-label">${p.title.replace(/['"]/g,'').trim()}</span>
    <div class="thumb-rect"><img src="${p.img}" alt=""></div>`;
  th.addEventListener('click', () => goTo(i));
  thumbNav.appendChild(th);
});

function layout(pos) {
  const vw = window.innerWidth;
  const vh = window.innerHeight;
  const cardH = vh * .78;
  const cardTop = (vh - cardH) / 2;

  cardEls.forEach((card, i) => {
    const rel  = i - pos;
    const angR = rel * ARC_DEG * Math.PI / 180;
    const yOff = RADIUS * Math.sin(angR);
    const zOff = RADIUS * (1 - Math.cos(angR));
    const tiltY = rel * -14;
    const absRel = Math.abs(rel);
    const opacity = Math.max(0, 1 - absRel * .65);
    const scale   = 1 - absRel * .04;

    card.style.transform = `translateY(${yOff}px) translateZ(${zOff}px) rotateY(${tiltY}deg) scale(${scale})`;
    card.style.opacity   = opacity;
    card.style.zIndex    = 20 - Math.round(absRel * 5);
    card.style.pointerEvents = absRel < 0.55 ? 'auto' : 'none';

    const img = card.querySelector('.card-img');
    if(img) {
      if(absRel < 0.5) {
        const px = ((mouseX/vw) - .5) * 44;
        const py = ((mouseY/vh) - .5) * 28;
        img.style.transform = `translate(${px}px,${py}px) scale(1.12)`;
      } else {
        img.style.transform = 'scale(1.12)';
      }
    }

    const tw = titleEls[i];
    tw.style.opacity = opacity;
    const cardCenterY = cardTop + cardH/2 + yOff * scale;
    tw.style.top = cardCenterY + 'px';
    tw.style.transform = `translateY(-50%) scale(${scale})`;
    tw.style.transformOrigin = 'center top';
    tw.style.pointerEvents = absRel < 0.55 ? 'auto' : 'none';
  });
}

function goTo(i) {
  i = Math.max(0, Math.min(PROJECTS.length - 1, i));
  scrollTarget = i;
  currentIdx   = i;
  document.querySelectorAll('.thumb-item').forEach((t, idx) =>
    t.classList.toggle('active', idx === i));
}

let wheelAcc = 0;
let wheelTimer = null;
window.addEventListener('wheel', e => {
  e.preventDefault();
  wheelAcc += e.deltaY;
  clearTimeout(wheelTimer);
  if(Math.abs(wheelAcc) >= 200) {
    goTo(currentIdx + (wheelAcc > 0 ? 1 : -1));
    wheelAcc = 0;
  }
  wheelTimer = setTimeout(() => { wheelAcc = 0; }, 300);
}, {passive: false});

let ty0 = 0;
window.addEventListener('touchstart', e => { ty0 = e.touches[0].clientY; }, {passive: true});
window.addEventListener('touchmove', e => {
  e.preventDefault();
  const d = ty0 - e.touches[0].clientY;
  if(Math.abs(d) > 40) { goTo(currentIdx + (d > 0 ? 1 : -1)); ty0 = e.touches[0].clientY; }
}, {passive: false});

document.addEventListener('mousemove', e => { mouseX = e.clientX; mouseY = e.clientY; });

const cur = document.getElementById('cursor');
document.querySelectorAll('.card,.thumb-item,.t-arrow,a').forEach(el => {
  el.addEventListener('mouseenter', () => cur.classList.add('big'));
  el.addEventListener('mouseleave', () => cur.classList.remove('big'));
});

function lerp(a, b, t) { return a + (b - a) * t; }
function tick() {
  scrollPos = lerp(scrollPos, scrollTarget, .07);
  layout(scrollPos);
  curX = lerp(curX, mouseX, .13);
  curY = lerp(curY, mouseY, .13);
  cur.style.left = curX + 'px';
  cur.style.top  = curY + 'px';
  requestAnimationFrame(tick);
}
tick();
</script>
</body>
</html>
